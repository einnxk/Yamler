name: Build

on:
  push:
  pull_request:
jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: 25
          distribution: "temurin"
          cache: gradle

      - name: Build
        run: ./gradlew clean build