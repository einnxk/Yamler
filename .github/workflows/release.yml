name: Auto Release

on:
  push:
    branches:
      - master

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Extract Version from Gradle
        id: get_version
        run: |
          VERSION=$(./gradlew -q help --eval "print(project.version)")
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "Extracted Version: $VERSION"

      - name: Check if Release exists
        id: check_release
        run: |
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            https://api.github.com/repos/${{ github.repository }}/releases/tags/${{ env.VERSION }})
          
          if [ "$HTTP_STATUS" = "200" ]; then
            echo "RELEASE_EXISTS=true" >> $GITHUB_ENV
            echo "Release ${{ env.VERSION }} already exists. Skipping creation."
          else
            echo "RELEASE_EXISTS=false" >> $GITHUB_ENV
            echo "Release ${{ env.VERSION }} is new. Proceeding..."
          fi

      - name: Create GitHub Release
        if: env.RELEASE_EXISTS == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          name: Release ${{ env.VERSION }}
          body: |
            Automatisches Release für Version ${{ env.VERSION }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Trigger JitPack Build
        if: env.RELEASE_EXISTS == 'false'
        run: |
          echo "Triggering JitPack for ${{ github.repository }} with version ${{ env.VERSION }}..."
          curl -s "https://jitpack.io/api/builds/com.github.${{ github.repository }}/${{ env.VERSION }}" > /dev/null
          echo "JitPack build triggered successfully"